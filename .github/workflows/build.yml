name: Build Tauri App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev webkit2gtk-4.0 libappindicator3-dev librsvg2-dev patchelf
        sudo apt-get install -y libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
        sudo apt-get install -y libwebkit2gtk-4.1-dev
    - name: Install frontend dependencies
      run: pnpm install
    - name: Build Tauri App
      run: pnpm tauri build
    - name: Upload Linux artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-app
        path: src-tauri/target/release/bundle/appimage/*.AppImage

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Setup Android SDK and NDK
        uses: android-actions/setup-android@v4
      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;27.1.12297006"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.1.12297006" >> $GITHUB_ENV
      - name: Install Tauri CLI
        run: cargo install tauri-cli
      - name: Install frontend dependencies
        run: pnpm install
      - name: Build Tauri Android App
        run: pnpm tauri android build
      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-app
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk

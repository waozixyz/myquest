name: Build Tauri App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Setup Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '18'
    - name: Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 6.x
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev webkit2gtk-4.0 libappindicator3-dev librsvg2-dev patchelf
    - name: Install frontend dependencies
      run: pnpm install
    - name: Build Tauri App
      run: pnpm tauri build
    - name: Upload Linux artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-app
        path: src-tauri/target/release/bundle/appimage/*.AppImage

  build-android:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [aarch64, armv7, i686, x86_64]
    steps:
    - uses: actions/checkout@v2
    - name: Setup Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '18'
    - name: Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 6.x
    - name: Setup Java JDK
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        target: ${{ matrix.target }}-linux-android
    - name: Install Android SDK
      uses: android-actions/setup-android@v2
    - name: Install frontend dependencies
      run: pnpm install
    - name: Build Tauri Android App
      run: pnpm tauri android build --target ${{ matrix.target }} --apk --split-per-abi
    - name: Upload Android artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-${{ matrix.target }}-app
        path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
        